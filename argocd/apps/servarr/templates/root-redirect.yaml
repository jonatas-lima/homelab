apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: servarr-root-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: servarr
  hostnames:
    - servarr.uzbunitim.me
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: servarr.uzbunitim.me
            path:
              type: ReplaceFullPath
              replaceFullPath: /movies
            statusCode: 302
