{{- if .Values.bazarr.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bazarr-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: servarr
  hostnames:
    - servarr.uzbunitim.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.bazarr.httpRoute.path }}
      backendRefs:
        - name: {{ include "bazarr.fullname" . }}
          port: {{ .Values.bazarr.service.port }}
{{- end }}
