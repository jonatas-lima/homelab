{{- if .Values.qbittorrent.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: servarr
  hostnames:
    - servarr.uzbunitim.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.qbittorrent.httpRoute.path }}
      backendRefs:
        - name: {{ include "qbittorrent.fullname" . }}
          port: 8080
{{- end }}
