    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # Additional volumes on the output Deployment definition.
  volumes:
    - name: movies
      persistentVolumeClaim:
        claimName: servarr-movies
    - name: downloads
      persistentVolumeClaim:
        claimName: servarr-downloads

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts:
    - name: downloads
      mountPath: /downloads
    - name: movies
      mountPath: /movies

