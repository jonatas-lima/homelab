    tag: "5.1.2-2"

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  httpRoute:
    enabled: true
    path: /torrents

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  ports:
    - containerPort: 8080
      name: http
    - containerPort: 6881
      protocol: UDP
      name: rss-udp
    - containerPort: 6881
      name: rss

  service:
    type: ClusterIP
    ports:
      - port: 8080
        name: http
      - port: 6881
        protocol: UDP
        name: rss-udp
      - port: 6881
        name: rss

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
