    enabled: true
    host: netflix.uzbunitim.me
    tlsSecret: netflix-tls
    annotations:
      cert-manager.io/cluster-issuer: vault
      cert-manager.io/common-name: netflix.uzbunitim.me

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: ClusterIP
    port: 8096

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  volumes:
    - name: movies
      persistentVolumeClaim:
        claimName: servarr-movies
    - name: tv
      persistentVolumeClaim:
        claimName: servarr-tv
    - name: config
      persistentVolumeClaim:
        claimName: servarr-jellyfin-config

  volumeMounts:
    - name: movies
      mountPath: /movies
    - name: tv
      mountPath: /tv
    - name: config
      mountPath: /config

  env:
    - name: JELLYFIN_PublishedServerUrl
      value: "https://netflix.uzbunitim.me"

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

