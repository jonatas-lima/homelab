apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        ports:
        - containerPort: 8096
        env:
        - name: JELLYFIN_PublishedServerUrl
          value: "http://netflix.uzbunitim.me"
        volumeMounts:
        - name: movies
          mountPath: /media/movies
          readOnly: true
        - name: cache
          mountPath: /cache
      volumes:
      - name: movies
        persistentVolumeClaim:
          claimName: radarr-movies
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
spec:
  selector:
    app: jellyfin
  ports:
  - port: 8096
    targetPort: 8096
  type: LoadBalancer  # ou NodePort
